# 2 つのコンテナで動かす。
#
# - data-redactor-api:
#     機密情報の検出・マスク処理と、その結果のキャッシュ（GiNZA・cache.db）を担う本体。
#     torch・GiNZA・pii-masker・Azure CLI を含むため、イメージは重い。
#     機密データ（data/）と Azure の認証情報（~/.azure）は、このコンテナだけが持つ。
# - data-redactor-ui:
#     画面の表示だけを担う。検出・マスクは自分では行わず、api に HTTP で問い合わせる。
#     そのため spaCy・torch・langchain・openai を含まず、イメージは軽い。
#
# api と ui は、それぞれ別の Dockerfile・別のイメージ。
# 起動は「docker compose up --build」。
# 初回は api が GiNZA electra の重みを読み込むため、起動までに時間がかかる。
services:
  data-redactor-api:
    image: data-redactor-api:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        APP_UID: ${UID:-1000}
        APP_GID: ${GID:-1000}
    container_name: data-redactor-api
    restart: unless-stopped
    ports:
      - "8509:8509"
    env_file: .env
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      # 検出結果のキャッシュや辞書などの機密データを、コンテナの外（ホストの data/）に残す。
      # 読み書きするのは、この api コンテナだけ。
      - ./data:/app/data
      # LLM 検出で使う Azure の認証に、ホストで実行済みの az login の結果を流用する。
      #
      # 注意:
      #   - az login は WSL / Linux 側で実行すること。
      #   - Windows の ~/.azure は暗号化されており、Linux コンテナ内の az では復号できず、認証に失敗する。
      #   - 環境変数でサービスプリンシパルを渡す方式にするなら、この行は不要。
      - ${HOME}/.azure:/home/appuser/.azure:rw
    # /health が 200 を返したら、起動時の GiNZA 読み込みが終わった合図。
    # これを ui の起動条件にして、読み込み中の api に ui がつないでエラー表示するのを防ぐ。
    # electra の読み込みに時間がかかるので、待ち始めるまでの猶予（start_period）は長めにとる。
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8509/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  data-redactor-ui:
    image: data-redactor-ui:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
      args:
        APP_UID: ${UID:-1000}
        APP_GID: ${GID:-1000}
    container_name: data-redactor-ui
    restart: unless-stopped
    ports:
      # ホストの 8508 番を、コンテナの 8501 番（Streamlit）につなぐ。
      # ホストの 8501 は他のアプリが使っていることがあるので、8508 にずらしている。
      - "8508:8501"
    env_file: .env
    environment:
      # ui は画面だけを担うので、検出・マスクは api に投げる。
      # その接続先を、compose のネットワーク内のサービス名（data-redactor-api）で指定する。
      - MASK_API_URL=http://data-redactor-api:8509
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      # api の /health が通る（GiNZA の読み込みが終わる）まで、ui は起動を待つ。
      data-redactor-api:
        condition: service_healthy
    # ui は data/ も Azure の認証も持たない。機密データと検出エンジンは api だけが持つ。
    #
    # kb-mcp をホスト側で動かしている場合の注意:
    #   - コンテナの中からは localhost では届かないので、host.docker.internal を使う
    #     （kb-mcp からの文書取得は ui コンテナが行うため）。
    #   - .env に KB_MCP_URL=http://host.docker.internal:8000/mcp を設定する。
    #   - Linux では下の extra_hosts を有効にする（Docker Desktop / Mac / Windows では不要）。
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
