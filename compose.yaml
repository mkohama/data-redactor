# 設計 B の 2 サービス・2 イメージ構成:
#   data-redactor-api … エンジン（GiNZA・cache.db）を持つ HTTP API（uvicorn）。torch/spaCy/GiNZA/
#                        pii-masker/Azure CLI を含む重イメージ。data/ と az をマウントする。
#   data-redactor-ui  … その純クライアントの Streamlit UI。MASK_API_URL で api を指すだけの軽イメージ
#                        （spaCy/torch/langchain/openai を含まない）。data/ も az も持たない（設計 B）。
#
# それぞれ別 Dockerfile・別イメージ。起動: `docker compose up --build`
# （初回は api の GiNZA electra prewarm で時間がかかる）。
services:
  data-redactor-api:
    image: data-redactor-api:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        APP_UID: ${UID:-1000}
        APP_GID: ${GID:-1000}
    container_name: data-redactor-api
    restart: unless-stopped
    ports:
      - "8509:8509"
    env_file: .env
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      # 機密データの永続化（cache.db / mask_dict.yaml / mask_allowlist.yaml）。API が単一所有する。
      - ./data:/app/data
      # Entra ID 認証（LLM 検出の Azure）: ホストの az login キャッシュを流用する。
      # ★ az login は WSL/Linux 側で実行すること（Windows の ~/.azure は DPAPI 暗号化されており
      #   Linux コンテナ内の az では復号できず認証に失敗する）。SP 環境変数方式を使うなら下行は不要。
      - ${HOME}/.azure:/home/appuser/.azure:rw
    # /health が 200 を返す＝起動時の GiNZA ロード完了（＝UI が繋いでよい状態）。curl は
    # ランタイムに導入済み（az cli 用）。electra ロードのぶん start_period を長めに取る。
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8509/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  data-redactor-ui:
    image: data-redactor-ui:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
      args:
        APP_UID: ${UID:-1000}
        APP_GID: ${GID:-1000}
    container_name: data-redactor-ui
    restart: unless-stopped
    ports:
      # ホスト 8508 → コンテナ 8501（ホストの 8501 は他で使用中のことがあるため 8508 を割当）。
      - "8508:8501"
    env_file: .env
    environment:
      # UI は純クライアント。compose ネットワーク内の api サービスを指す（設計 B）。
      - MASK_API_URL=http://data-redactor-api:8509
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      # API が healthy（GiNZA ロード完了）になってから UI を上げる＝初回接続エラーを避ける。
      data-redactor-api:
        condition: service_healthy
    # UI は data/ も az も持たない（エンジン・機密の所有者は api だけ＝設計 B）。
    # -- kb-mcp がホスト側で動く場合、コンテナからは localhost ではなく host.docker.internal で繋ぐ
    #    （kb 文書の取得は UI プロセスが行う）。.env で
    #    KB_MCP_URL=http://host.docker.internal:8000/mcp とし、Linux では以下を有効化する
    #    （Docker Desktop / Mac / Windows では既定で解決できるため不要）。
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
